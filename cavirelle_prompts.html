<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cavirelle — Claymation Prompts</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #1a1a1a;
      color: #e8e0cc;
      padding: 32px 24px;
      min-height: 100vh;
    }

    header {
      margin-bottom: 40px;
    }

    header h1 {
      font-size: 22px;
      font-weight: 600;
      color: #f0e8d0;
      letter-spacing: 0.02em;
    }

    header p {
      font-size: 13px;
      color: #888;
      margin-top: 6px;
    }

    .scenes {
      display: flex;
      flex-direction: column;
      gap: 20px;
      max-width: 860px;
    }

    .card {
      background: #242424;
      border: 1px solid #333;
      border-radius: 10px;
      overflow: hidden;
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      border-bottom: 1px solid #333;
      background: #2a2a2a;
    }

    .card-header h2 {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #c8a87a;
    }

    .copy-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: 6px;
      border: 1px solid #444;
      background: #333;
      color: #ccc;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s ease;
      white-space: nowrap;
    }

    .copy-btn:hover {
      background: #3d3d3d;
      border-color: #c8a87a;
      color: #f0e8d0;
    }

    .copy-btn.copied {
      background: #1f3a2a;
      border-color: #4caf78;
      color: #4caf78;
    }

    .copy-btn svg {
      width: 13px;
      height: 13px;
      flex-shrink: 0;
    }

    .prompt-text {
      padding: 16px 18px;
      font-size: 13px;
      line-height: 1.7;
      color: #c8c0b0;
      font-family: "SF Mono", "Fira Code", "Menlo", monospace;
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 160px;
      overflow: hidden;
      position: relative;
      transition: max-height 0.3s ease;
    }

    .prompt-text.expanded {
      max-height: none;
    }

    .prompt-text::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 48px;
      background: linear-gradient(transparent, #242424);
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .prompt-text.expanded::after {
      opacity: 0;
    }

    .expand-btn {
      width: 100%;
      padding: 8px;
      background: none;
      border: none;
      border-top: 1px solid #2e2e2e;
      color: #666;
      font-size: 11px;
      cursor: pointer;
      transition: color 0.15s;
      letter-spacing: 0.05em;
    }

    .expand-btn:hover {
      color: #aaa;
    }
  </style>
</head>
<body>

<header>
  <div style="display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px;">
    <div>
      <h1>Cavirelle — Claymation Prompts</h1>
      <p>5 Scenes · 9:16 · Claymation-CGI</p>
    </div>
    <button class="copy-btn" id="copy-all" style="padding:10px 20px; font-size:13px;">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="5" y="5" width="9" height="9" rx="1.5"/>
        <path d="M11 5V3.5A1.5 1.5 0 0 0 9.5 2h-6A1.5 1.5 0 0 0 2 3.5v6A1.5 1.5 0 0 0 3.5 11H5"/>
      </svg>
      Copy All 5 Scenes
    </button>
  </div>
</header>

<div class="scenes" id="scenes"></div>

<script>
  const scenes = [
    {
      title: "Scene 1 — Schmerz am Mini-Schreibtisch",
      label: "SCENE 1: Schmerz am Mini-Schreibtisch",
      prompt: `Claymation-CGI-Animationsstil, sichtbare Fingerabdrücke auf Plastilin-Oberflächen, matte Knetmasse-Textur, warme erdige Töne, Stop-Motion-Ruckeln, Miniaturset-Ästhetik mit handgebauten Möbeln und Requisiten, tilt-shift macro depth of field, vielfältige Farbpalette mit klar unterscheidbaren Objekten, handgemacht und bewusst unperfekt, 9:16 vertical, high detail. A claymation figure of Anna, 38 years old, made of soft plasticine, shoulder-length straight dark blonde clay hair with visible tool marks, simple round brown clay eyes, fair clay skin with tiny fingerprints, wearing a hand-shaped grey knitted clay sweater, dark blue clay pants and flat clay shoes, slightly imperfect handcrafted proportions. She sits at a small hand-built miniature desk made of clay and cardboard, a tiny clay laptop open in front of her, a small clay coffee mug beside it. She holds both clay hands up in front of her, fingers stiffly curled, one clay hand gripping the other wrist, expression a tight grimace with downturned clay mouth and furrowed clay brow — conveying hand pain and stiffness. Warm clay-ivory (#E8E0CC) backdrop fills the entire 9:16 canvas behind the set. Soft cool daylight from a tiny clay window to the side, casting gentle shadow. Medium close-up, Anna sharp, desk softly blurred. No text, no watermark, no logo. IMPORTANT: tall portrait 9:16 aspect ratio.`
    },
    {
      title: "Scene 2 — Das Mini-Cavirelle-Gerät",
      label: "SCENE 2: Das Mini-Cavirelle-Gerät",
      prompt: `Claymation-CGI-Animationsstil, sichtbare Fingerabdrücke auf Plastilin-Oberflächen, matte Knetmasse-Textur, warme erdige Töne, Stop-Motion-Ruckeln, Miniaturset-Ästhetik mit handgebauten Möbeln und Requisiten, tilt-shift macro depth of field, vielfältige Farbpalette mit klar unterscheidbaren Objekten, handgemacht und bewusst unperfekt, 9:16 vertical, high detail. The same claymation Anna figure, 38 years old, plasticine character with shoulder-length straight dark blonde clay hair, simple round brown clay eyes, fair clay skin with tiny fingerprints, wearing grey knitted clay sweater, dark blue clay pants and flat clay shoes, exact same handcrafted look as before. She holds the clay Cavirelle device up towards the camera with both hands — the device shape, proportions and structure faithfully translated from the reference product image into claymation plasticine style, with matte clay texture, visible fingerprint marks, a subtle warm orange infrared glow from translucent yellow-orange clay pieces within, and tiny clay pressure nodes matching the real device. Background is a softly blurred miniature living room set with a tiny clay couch and a clay side table. Warm clay-ivory (#E8E0CC) backdrop fills the canvas. Warm soft daylight, gentle highlight glowing from the clay device. Medium close-up, device slightly closer to camera than her face, device and Anna sharp, set blurred. Anna has a calm, explaining expression, mouth a soft open shape. No text on Cavirelle device except a tiny Cavirelle logo, no watermark, no logo on canvas. REFERENCE IMAGE: The Cavirelle device must exactly replicate the shape, proportions and structure from the provided reference product image, translated into claymation plasticine style — do not invent or approximate the device form. IMPORTANT: tall portrait 9:16 aspect ratio.`
    },
    {
      title: "Scene 3 — Infrarot-Wärme & Entspannung",
      label: "SCENE 3: Infrarot-Wärme & Entspannung",
      prompt: `Claymation-CGI-Animationsstil, sichtbare Fingerabdrücke auf Plastilin-Oberflächen, matte Knetmasse-Textur, warme erdige Töne, Stop-Motion-Ruckeln, Miniaturset-Ästhetik mit handgebauten Möbeln und Requisiten, tilt-shift macro depth of field, vielfältige Farbpalette mit klar unterscheidbaren Objekten, handgemacht und bewusst unperfekt, 9:16 vertical, high detail. The same claymation Anna figure, 38 years old, plasticine character with shoulder-length straight dark blonde clay hair, simple round brown clay eyes, fair clay skin with tiny fingerprints, wearing grey knitted clay sweater, dark blue clay pants and flat clay shoes, exact same handcrafted look as before. She sits relaxed on a hand-built miniature couch made of patchwork clay cushions, one clay hand gently resting inside the clay Cavirelle device placed on her lap — the device shape and structure faithfully replicated from the reference product image in claymation plasticine style — emitting a soft warm orange-amber infrared glow made of translucent clay. Her other hand rests open and relaxed. Her expression is one of calm relief — eyes softly closed, clay mouth curved into a small gentle smile. Background is a hand-built miniature living room with a tiny clay bookshelf and small clay houseplants. Warm clay-ivory (#E8E0CC) backdrop fills the canvas. Warm golden lamp light mixed with the amber glow from the device, golden hour mood. Medium shot at eye level, Anna and device sharp, soft bokeh on bookshelf. No text, no watermark, no logo. REFERENCE IMAGE: The Cavirelle device must exactly replicate the shape, proportions and structure from the provided reference product image, translated into claymation plasticine style — do not invent or approximate the device form. IMPORTANT: tall portrait 9:16 aspect ratio.`
    },
    {
      title: "Scene 4 — Schock: Die Finger bewegen sich wieder",
      label: "SCENE 4: Schock — Die Finger bewegen sich wieder",
      prompt: `Claymation-CGI-Animationsstil, sichtbare Fingerabdrücke auf Plastilin-Oberflächen, matte Knetmasse-Textur, warme erdige Töne, Stop-Motion-Ruckeln, Miniaturset-Ästhetik mit handgebauten Möbeln und Requisiten, tilt-shift macro depth of field, vielfältige Farbpalette mit klar unterscheidbaren Objekten, handgemacht und bewusst unperfekt, 9:16 vertical, high detail. The same claymation Anna figure, 38 years old, plasticine character with shoulder-length straight dark blonde clay hair, simple round brown clay eyes now wide with joyful shock, fair clay skin with tiny fingerprints, wearing grey knitted clay sweater, dark blue clay pants and flat clay shoes, exact same handcrafted look as before. She holds both clay hands out in front of her, fingers fully spread open and extended — in stark contrast to the cramped position from before — staring at her own hands with an expression of amazed disbelief, one clay hand covers her open clay mouth. She stands at a small miniature kitchen counter with a tiny clay cup and clay bowl. The clay Cavirelle device — shape and structure faithfully replicated from the reference product image in claymation plasticine style — sits beside her on the countertop, still emitting a faint warm glow. Warm clay-ivory (#E8E0CC) backdrop fills the canvas. Bright warm daylight from a miniature clay window, slightly dramatic side lighting. Close-up portrait, slight camera tilt for drama, Anna face and hands both sharp, background softly blurred. No text, no watermark, no logo. REFERENCE IMAGE: The Cavirelle device must exactly replicate the shape, proportions and structure from the provided reference product image, translated into claymation plasticine style — do not invent or approximate the device form. IMPORTANT: tall portrait 9:16 aspect ratio.`
    },
    {
      title: "Scene 5 — CTA: Direkte Ansprache",
      label: "SCENE 5: CTA — Direkte Ansprache",
      prompt: `Claymation-CGI-Animationsstil, sichtbare Fingerabdrücke auf Plastilin-Oberflächen, matte Knetmasse-Textur, warme erdige Töne, Stop-Motion-Ruckeln, Miniaturset-Ästhetik mit handgebauten Möbeln und Requisiten, tilt-shift macro depth of field, vielfältige Farbpalette mit klar unterscheidbaren Objekten, handgemacht und bewusst unperfekt, 9:16 vertical, high detail. The same claymation Anna figure, 38 years old, plasticine character with shoulder-length straight dark blonde clay hair, simple round brown clay eyes, fair clay skin with tiny fingerprints, wearing grey knitted clay sweater, dark blue clay pants and flat clay shoes, exact same handcrafted look as before. She stands slightly off-center in a clean minimal miniature set, holding the clay Cavirelle device towards the camera with both hands — the device shape and structure faithfully replicated from the reference product image in claymation plasticine style — device emitting a soft warm amber infrared glow. Confident friendly direct gaze into camera, mouth a small open warm smile. Background is a softly blurred minimal clay shelf with a small clay plant and the clay Cavirelle packaging box. Warm clay-ivory (#E8E0CC) backdrop fills the canvas. Soft warm overhead light, gentle highlight on the clay device glow. Medium shot, device and Anna equally sharp, background set softly blurred. No text on Cavirelle device except a tiny Cavirelle logo, no watermark, no logo on canvas. REFERENCE IMAGE: The Cavirelle device must exactly replicate the shape, proportions and structure from the provided reference product image, translated into claymation plasticine style — do not invent or approximate the device form. IMPORTANT: tall portrait 9:16 aspect ratio.`
    }
  ];

  function formatScene(scene) {
    return `--- ${scene.label} ---\n${scene.prompt}`;
  }

  const container = document.getElementById('scenes');

  scenes.forEach((scene, i) => {
    const card = document.createElement('div');
    card.className = 'card';

    card.innerHTML = `
      <div class="card-header">
        <h2>${scene.title}</h2>
        <button class="copy-btn" data-index="${i}">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="5" y="5" width="9" height="9" rx="1.5"/>
            <path d="M11 5V3.5A1.5 1.5 0 0 0 9.5 2h-6A1.5 1.5 0 0 0 2 3.5v6A1.5 1.5 0 0 0 3.5 11H5"/>
          </svg>
          Copy
        </button>
      </div>
      <div class="prompt-text" id="text-${i}">${scene.prompt}</div>
      <button class="expand-btn" data-index="${i}">▾ Show full prompt</button>
    `;

    container.appendChild(card);
  });

  document.getElementById('copy-all').addEventListener('click', async function() {
    const all = scenes.map(formatScene).join('\n \n');
    await navigator.clipboard.writeText(all);
    this.classList.add('copied');
    this.innerHTML = `<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 8l3.5 3.5L13 4.5"/></svg> Copied!`;
    setTimeout(() => {
      this.classList.remove('copied');
      this.innerHTML = `<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="5" y="5" width="9" height="9" rx="1.5"/><path d="M11 5V3.5A1.5 1.5 0 0 0 9.5 2h-6A1.5 1.5 0 0 0 2 3.5v6A1.5 1.5 0 0 0 3.5 11H5"/></svg> Copy All 5 Scenes`;
    }, 2000);
  });

  document.querySelectorAll('.copy-btn[data-index]').forEach(btn => {
    btn.addEventListener('click', async () => {
      const idx = btn.dataset.index;
      await navigator.clipboard.writeText(formatScene(scenes[idx]));
      btn.classList.add('copied');
      btn.innerHTML = `
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M3 8l3.5 3.5L13 4.5"/>
        </svg>
        Copied!
      `;
      setTimeout(() => {
        btn.classList.remove('copied');
        btn.innerHTML = `
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="5" y="5" width="9" height="9" rx="1.5"/>
            <path d="M11 5V3.5A1.5 1.5 0 0 0 9.5 2h-6A1.5 1.5 0 0 0 2 3.5v6A1.5 1.5 0 0 0 3.5 11H5"/>
          </svg>
          Copy
        `;
      }, 2000);
    });
  });

  document.querySelectorAll('.expand-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const idx = btn.dataset.index;
      const text = document.getElementById(`text-${idx}`);
      const expanded = text.classList.toggle('expanded');
      btn.textContent = expanded ? '▴ Collapse' : '▾ Show full prompt';
    });
  });
</script>
</body>
</html>
